name: CI Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check server file exists
        run: |
          test -f server.js && echo "✅ server.js found"
          test -f public/index.html && echo "✅ index.html found"
          test -f package.json && echo "✅ package.json found"
          echo "✅ All files present!"

      - name: Verify Express is installed
        run: node -e "require('express'); console.log('✅ Express loaded successfully')"
